## 3) Power provisioning

### 3.1 Safe power from vehicle 12 V (without affecting ECUs)
1. **Prefer powering instrumentation from:**
   1) Dedicated accessory outlet circuit (12 V socket)  
   2) Approved upfitter/aux terminals (if present)  
   3) Add-a-fuse at an accessory/IGN circuit (only if approved)  
   *Rationale:* Avoids direct battery/ECU feeds and unintended wakeups.

2. **Measure baseline 12 V behavior (before connecting loads):**
   - IGN OFF: record voltage and current draw if you can measure clamp/inline on your added circuit.  
   - IGN ON/READY: record stabilized voltage (**typically 13.2–14.7 V**).  
   *Rationale:* Ensures your DC/DC and logger supply range is compatible.

3. **Add an inline fuse at the power source (within 150 mm):**
   - Size fuse to **125–150% of expected steady load**, but **≤ wire ampacity**.  
   - Common temporary instrumentation fuses:
     - Small logger/sensors (≤2 A): **3 A or 5 A**
     - Moderate DAQ + radio (3–6 A): **7.5 A or 10 A**
     - Larger setups (6–12 A): **15 A** (re-check wiring gauge)  
   *Rationale:* Protects the vehicle and harness from shorts.

4. **Wire gauge guidance for up to 5 m one-way run (10 m round trip):**
   - Up to 3 A: **20 AWG (0.5 mm²)** minimum (prefer 18 AWG)  
   - Up to 7.5 A: **18 AWG (0.75–1.0 mm²)**  
   - Up to 15 A: **16 AWG (1.5 mm²)** (consider 14 AWG if voltage drop sensitive)  
   *Pass/Fail:* Voltage at instrument under max load stays within device spec (commonly >11.0 V).  
   *Rationale:* Limits voltage drop and heating.

5. **Add a dedicated return (ground) to a known chassis ground point** (ring terminal, cleaned metal, corrosion inhibitor afterward).  
   *Rationale:* Prevents noisy grounds and ECU ground path interference.

6. **If powering 5 V gear:** use a **12 V→5 V DC/DC** module with:
   - Automotive input range (**9–16 V** or wider), transient protection, and adequate current rating.  
   *Rationale:* Avoids resets during crank-like transients and DC/DC switching events.

### 3.2 Temporary isolated power (if instrument must float)
1. **Use an isolated DC/DC converter** (12 V in → 12 V out isolated, or 12 V→5 V isolated) with:
   - Isolation rating **≥500 VDC** minimum (prefer **1 kVDC**) for robust separation from vehicle ground.  
   *Rationale:* Breaks ground loops and reduces risk of fault currents.

2. **Do not connect isolated output negative to chassis ground** unless the test plan explicitly requires it.  
   *Rationale:* Defeats isolation and can create unexpected return paths.

3. **If oscilloscope uses earth-grounded mains (shop power):**
   - Prefer battery-powered scope or use differential probes/isolated inputs when measuring vehicle signals.  
   *Rationale:* Earth-referenced scopes can short vehicle nodes to earth through probe grounds.

### 3.3 Verify no backfeed and monitor current draw
1. **Add backfeed protection where appropriate:**
   - Use an **automotive ideal diode / OR-ing diode** or at minimum a series Schottky diode if powering devices that might be externally powered (USB/laptop).  
   *Rationale:* Prevents feeding 12 V into vehicle circuits through test equipment.

2. **Backfeed check (DMM):**
   - With vehicle power removed (IGN OFF, circuit de-energized), disconnect the fuse and measure voltage on the vehicle-side feed: should be **~0 V**.  
   - Plug in instrumentation and check that vehicle-side remains **~0 V** (no reverse voltage).  
   *Pass/Fail:* Reverse voltage **<0.5 V** on vehicle side (ideally 0 V).  
   *Rationale:* Detects unintended reverse powering.

3. **Current draw monitoring:**
   - Measure your instrumentation branch current:
     - IGN OFF/sleep target: keep additional draw typically **<50–100 mA** unless approved.
     - IGN ON/READY: ensure draw is within fused design.  
   *Rationale:* Excess parasitic load causes 12 V battery drain and ECU sleep issues.

