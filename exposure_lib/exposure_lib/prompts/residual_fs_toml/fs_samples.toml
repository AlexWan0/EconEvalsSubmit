Human: You are an expert Clinical Nurse Specialist and infection prevention specialist. Develop a departmental Infection Prevention and Control (IPC) policy for a medical-surgical unit in a large urban hospital.

The policy should be suitable for immediate review by hospital leadership and the infection control committee and organized with the following sections and content:

1. Title and scope
- Title: Medical-Surgical Unit Infection Prevention and Control Policy
- Clear scope describing patient populations, staff, visitors, and areas covered.

2. Purpose and objectives
- Concise purpose statement.
- Measurable objectives (e.g., reduce hospital-acquired infections [HAIs] by X% within Y months; provide recommended targets with justification for X and Y).

3. Definitions
- Define key terms used in the policy (HAI, standard precautions, transmission-based precautions, cohorting, surveillance, outbreak, PPE, hand hygiene, isolation precautions).

4. Roles and responsibilities
- Responsibilities for Clinical Nurse Specialist, Unit Nurse Manager, bedside nurses, physicians, Environmental Services, Infection Prevention Department, Occupational Health, Supply Chain, and hospital leadership.
- Escalation pathway for suspected outbreaks.

5. Standard precautions
- Hand hygiene indications (referencing the WHO 5 Moments) and recommended products (alcohol-based hand rub vs soap and water) with context.
- PPE use for routine care and for specific procedures (e.g., aerosol-generating procedures).
- Safe injection practices and sharps handling.

6. Transmission-based precautions
- Criteria for Droplet, Contact, and Airborne precautions.
- Room placement guidance (single room, cohorting criteria).
- Duration of precautions and criteria for discontinuation (test-based and symptom-based strategies).

7. Environmental cleaning and disinfection
- Daily and terminal cleaning protocols.
- High-touch surfaces and recommended disinfectants with contact times (use EPA-registered hospital-grade disinfectants).
- Cleaning frequency for patient rooms, equipment, and shared devices (e.g., vital signs machines, glucometers).

8. Device-associated infection prevention
- Bundles and checklists for CLABSI, CAUTI, and VAE/VAP.
- Removal criteria and daily assessment prompts.

9. Surveillance and monitoring
- Active surveillance strategy for common HAIs in medical-surgical units.
- Data elements, frequency, and minimum reporting metrics (e.g., incidence rates per 1,000 device-days, hand hygiene compliance, PPE compliance).
- Data presentation (run charts, monthly dashboards) and reporting recipients.

10. Education and training
- New hire orientation content and frequency.
- Annual competency assessments and just-in-time training for outbreaks.
- Training methods (simulation, return demonstration, microlearning modules).

11. Outbreak recognition and response
- Criteria for declaring an outbreak at unit level.
- Immediate actions (case finding, isolation/cohorting, enhanced cleaning, staff screening).
- Communication plan (internal and public health notification triggers).

12. Supplies and logistics
- Minimum on-unit PPE and disinfectant stock levels, and process for emergency resupply.
- Contingency plan for shortages (conservation strategies aligned with CDC guidance).

13. Auditing and quality improvement
- Audit tools (hand hygiene, PPE use, environmental cleaning, device care).
- Audit frequency and personnel.
- Process for root-cause analysis and Plan-Do-Study-Act (PDSA) cycles.

14. Documentation and recordkeeping
- Required documentation in the electronic health record and unit logs (isolation start/stop, cleaning logs, staff exposures).

15. References
- Cite current authoritative guidance (e.g., CDC, WHO, SHEA, APIC) with full reference lines suitable for inclusion in the policy.

16. Revision history and approval
- Version, author, approval signatures, and review date.
- Suggested review cycle (annual or earlier if new evidence).

Deliverables:
- A polished policy document, approximately 6–12 pages when formatted, with the sections above.
- Appendices:
  A. One-page bedside quick reference summarizing precautions, PPE donning/doffing steps, and room signage templates.
  B. One-page audit checklist for daily environmental cleaning.
  C. Sample monthly surveillance dashboard layout (text description and suggested metrics).
  D. Sample outbreak notification email template to leadership and public health.

Tone and level:
- Professional and actionable, suitable for immediate implementation with minimal editing by hospital leadership.
- Assume typical US acute-care resources; include contingency notes for limited-supply situations.

Instructions:
- Do not request additional files or data.
- Produce a self-contained policy with recommended numeric targets and clear instructions that clinical leadership can adopt directly.

LLM: ## 1. Title and Scope

**Title:** **Medical-Surgical Unit Infection Prevention and Control (IPC) Policy**

**Scope:**  
This policy applies to all infection prevention and control practices within the **Medical-Surgical Unit** of [Hospital Name], a large urban acute-care hospital. It covers:

- **Patient populations:** Adult medical-surgical inpatients, including patients with indwelling devices (e.g., central lines, urinary catheters), post-operative patients, immunocompromised patients, and patients under investigation (PUI) for communicable infections.
- **Staff:** Registered nurses, nursing assistants, physicians/APPs, respiratory therapists, PT/OT, phlebotomy, radiology technologists, unit clerks, Environmental Services (EVS), transport, dietary, and all ancillary staff working on the unit.
- **Learners/contractors:** Students, agency staff, vendors, maintenance/engineering staff when present on the unit.
- **Visitors:** Family members, caregivers, and other visitors.
- **Areas included:** Patient rooms (private and semi-private), isolation rooms, medication rooms, clean/dirty utility rooms, nursing stations, staff break rooms (as applicable), patient bathrooms, soiled holding areas, supply rooms, hallways, and any designated procedure areas within the unit.
- **Interfaces:** Coordination with ICU/ED/procedural areas for patient transfers, and with inpatient diagnostic services for transport and shared equipment.

---

## 2. Purpose and Objectives

**Purpose:**  
To prevent transmission of infectious agents and reduce the incidence of healthcare-associated infections (HAIs) in the Medical-Surgical Unit through standardized evidence-based practices in hand hygiene, PPE use, isolation precautions, device care, environmental cleaning, surveillance, and outbreak management.

**Measurable Objectives (Unit-Level):**  
The following targets are recommended for a medical-surgical unit with typical U.S. acute-care resources and are aligned with achievable performance improvement benchmarks using bundle-based prevention and consistent auditing.

1. **Reduce unit-attributable HAIs by 20% within 12 months** (from baseline established by the preceding 12 months).  
   - *Justification:* A 20% reduction in 12 months is commonly achievable with bundle adherence, reliable hand hygiene, and targeted device reduction without requiring major capital changes.

2. **Achieve and sustain ≥90% hand hygiene compliance within 6 months**, measured by direct observation and/or validated electronic monitoring (if available).  
   - *Justification:* ≥90% is associated with meaningful reductions in transmission; 6 months supports training + audit-feedback cycles.

3. **Maintain CLABSI and CAUTI performance at or below national benchmark (SIR ≤ 1.0) each quarter**, with a stretch goal **SIR ≤ 0.75** by 12 months if baseline is above benchmark.  
   - *Justification:* Aligns with CDC NHSN risk-adjusted benchmarking and leadership accountability.

4. **Improve device utilization ratios (DUR):**
   - **Urinary catheter DUR reduction by 10% within 9 months**  
   - **Central line DUR reduction by 5% within 12 months** (where clinically feasible)  
   - *Justification:* Reducing unnecessary device-days decreases infection opportunity and is achievable through daily necessity prompts and nurse-driven removal pathways.

5. **Achieve ≥95% compliance with transmission-based precaution signage and PPE adherence within 6 months**, based on weekly audits.  
   - *Justification:* High reliability in isolation practices is required to prevent outbreaks.

---

## 3. Definitions

- **Healthcare-Associated Infection (HAI):** An infection not present or incubating at the time of admission and occurring in association with healthcare delivery, typically identified per CDC/NHSN definitions.
- **Standard Precautions:** Minimum infection prevention measures applied to all patient care regardless of suspected/confirmed infection status, including hand hygiene and appropriate PPE based on anticipated exposure.
- **Transmission-Based Precautions (TBP):** Additional precautions used when standard precautions alone are insufficient to prevent transmission. Includes **Contact**, **Droplet**, and **Airborne** precautions.
- **Cohorting:** Placement of patients with the same confirmed infectious organism in the same room/area with dedicated staff and equipment when single rooms are limited.
- **Surveillance:** Systematic, ongoing collection, analysis, interpretation, and dissemination of data regarding HAIs and process measures to reduce risk.
- **Outbreak:** Increase in cases above baseline for a given organism/syndrome or evidence of transmission on the unit (e.g., epidemiologically linked cases).
- **Personal Protective Equipment (PPE):** Barriers worn to reduce exposure to infectious agents (e.g., gloves, gown, mask, respirator, eye protection).
- **Hand Hygiene:** Use of alcohol-based hand rub (ABHR) or soap and water to reduce transient microorganisms on hands.
- **Isolation Precautions:** Practices (room placement, PPE, signage, transport limitations) used to prevent transmission of infectious agents in healthcare settings; includes standard + TBP.

---

## 4. Roles and Responsibilities

**Clinical Nurse Specialist (CNS) – Medical-Surgical Unit**
- Leads unit IPC practice implementation and sustainment.
- Partners with Infection Prevention (IP) to interpret data, drive improvements, and lead PDSA cycles.
- Develops/updates unit workflows, training, and competency assessments.
- Co-leads outbreak response at unit level with IP and Nurse Manager.

**Unit Nurse Manager**
- Ensures staffing, resources, and compliance expectations.
- Enforces adherence to hand hygiene, PPE, and device bundles.
- Ensures audit completion and timely corrective actions.
- Escalates IPC concerns and supports outbreak incident command as needed.

**Bedside Nurses (RNs/LPNs)**
- Execute standard and transmission-based precautions reliably.
- Perform device maintenance per bundle and assess necessity daily.
- Educate patients/visitors on hand hygiene and isolation.
- Document isolation start/stop, device necessity, and care per policy.
- Report suspected transmission/outbreak signals immediately.

**Physicians/Advanced Practice Providers**
- Order appropriate isolation precautions promptly (or per protocol-driven initiation).
- Minimize device use; document indication and daily necessity.
- Order diagnostic testing guided by stewardship and IP recommendations.
- Participate in outbreak control measures, including patient cohorting decisions.

**Environmental Services (EVS)**
- Performs daily and terminal cleaning per protocol and product contact times.
- Uses appropriate disinfectants and cleaning technique (clean-to-dirty; high-touch priority).
- Documents cleaning completion in EVS logs; escalates supply or access barriers.

**Infection Prevention Department**
- Provides oversight, surveillance, analytics, and outbreak investigation leadership.
- Validates HAI events per NHSN definitions; reports to committees and regulatory bodies as required.
- Issues organism-specific isolation guidance and discontinuation criteria.
- Coordinates with public health authorities as needed.

**Occupational Health**
- Manages staff exposures, return-to-work guidance, vaccination programs, and fit testing.
- Coordinates staff testing/screening during outbreaks.

**Supply Chain/Materials Management**
- Maintains reliable availability of PPE, disinfectants, hand hygiene supplies, and dedicated equipment.
- Activates contingency supply plans during shortages.

**Hospital Leadership (CNO, CMO, COO, Quality/Safety)**
- Provides authority and resources for implementation, staffing support, and environmental/equipment needs.
- Reviews IPC dashboards, removes barriers, and holds leaders accountable.
- Activates incident command for major outbreaks or high-consequence pathogens.

### Escalation Pathway for Suspected Outbreaks (Unit-Level)
1. **Immediate recognition** by any staff → notify **Charge RN + Unit Nurse Manager**.
2. Notify **Infection Prevention On-Call** (same shift; do not delay until next day).
3. If severe/high-consequence pathogen suspected (e.g., measles, novel respiratory pathogen):  
   - Implement appropriate TBP immediately,  
   - Notify **Hospital Operator to page IP + Administrator-on-Call + Occupational Health**,  
   - Consider **incident command** activation per hospital emergency management policy.
4. Document in unit outbreak log and begin line list per IP guidance.

---

## 5. Standard Precautions

### 5.1 Hand Hygiene
**Policy:** Hand hygiene is required for all staff, patients (when feasible), and visitors at key moments of care.

**WHO 5 Moments (required):**
1. **Before touching a patient**
2. **Before clean/aseptic procedure**
3. **After body fluid exposure risk**
4. **After touching a patient**
5. **After touching patient surroundings**

**Product selection:**
- **Alcohol-Based Hand Rub (ABHR)** is the default for routine care when hands are not visibly soiled (preferred for efficacy, speed, and access).
- **Soap and water** required when:
  - Hands are **visibly soiled**  
  - After caring for patients with **suspected/confirmed C. difficile** or other spore-forming organisms (per IP guidance)  
  - After restroom use and before eating  
- **Technique expectations:**  
  - ABHR: apply adequate volume; rub all hand surfaces until dry (typically ~20 seconds).  
  - Soap/water: lather and scrub all surfaces including thumbs/fingertips; rinse and dry; total time ~40–60 seconds.

**Visitor guidance:** Visitors must perform hand hygiene upon entry and exit, and as instructed by staff.

### 5.2 Personal Protective Equipment (PPE)
**General rule:** PPE selection is based on anticipated exposure to blood/body fluids, respiratory secretions, non-intact skin, mucous membranes, and contaminated surfaces/equipment.

- **Gloves:** When touching blood/body fluids, mucous membranes, non-intact skin, contaminated items; remove and perform hand hygiene immediately after.
- **Gown:** When clothing/skin may be exposed to blood/body fluids or during Contact precautions; remove before leaving the room.
- **Mask and eye protection (goggles/face shield):** For splash/spray risk and for respiratory precautions as indicated.
- **Respiratory protection for aerosol-generating procedures (AGPs):**
  - For patients with suspected/confirmed airborne or high-risk respiratory pathogens: use **fit-tested N95 (or higher) + eye protection**, plus gown/gloves as indicated.
  - AGPs include (non-exhaustive): intubation/extubation, bronchoscopy, open suctioning, nebulized treatments (per facility risk assessment), CPR, noninvasive ventilation.

**Donning/doffing:** Follow posted sequence and perform hand hygiene at each critical step (see Appendix A).

### 5.3 Safe Injection Practices and Sharps Handling
- Use **aseptic technique** for all injections/IV access.
- **One needle, one syringe, one time**; never reuse syringes/needles.
- Use single-dose vials whenever possible; if multi-dose vial used, dedicate to a single patient when feasible and label with date/time opened per pharmacy policy.
- Disinfect vial diaphragms and needleless connectors per policy (e.g., alcohol for appropriate contact time).
- Activate safety devices immediately after use.
- Dispose of sharps directly into approved sharps containers; do not recap unless required by specific procedure and safe method used.
- Report sharps injuries/exposures immediately to Occupational Health and complete incident reporting.

---

## 6. Transmission-Based Precautions (TBP)

**Policy:** TBP will be initiated promptly based on symptoms, clinical suspicion, or confirmed lab results. When in doubt, **initiate precautions and consult IP**.

### 6.1 Contact Precautions (examples/criteria)
Initiate for:
- **C. difficile** (use soap/water for hand hygiene; sporicidal disinfectant per EVS/IP policy)
- MDROs per facility policy (e.g., MRSA, VRE, CRE) if indicated
- Uncontrolled draining wounds, scabies, certain enteric infections with incontinence
- RSV and other pathogens per facility risk assessment (may be Contact + Droplet)

**PPE:** Gown + gloves on room entry; dedicated equipment.

### 6.2 Droplet Precautions (examples/criteria)
Initiate for:
- Suspected/confirmed influenza, pertussis, meningococcal disease, mumps, rubella, certain viral respiratory infections per IP guidance

**PPE:** Surgical mask on room entry; eye protection per risk; add gown/gloves per standard precautions and/or organism-specific guidance.

### 6.3 Airborne Precautions (examples/criteria)
Initiate for:
- Suspected/confirmed **tuberculosis**, **measles**, **varicella**, disseminated zoster, and other pathogens per IP guidance

**Room:** Airborne Infection Isolation Room (**AIIR**) required.

**PPE:** Fit-tested **N95 or higher** (PAPR acceptable), per respiratory protection program.

### 6.4 Room Placement Guidance
- **Preferred:** Single patient room for all TBP.
- **If limited single rooms:**
  - **Cohort** only with **same confirmed organism** and similar symptom profile, with IP approval.
  - Maintain **dedicated staff** when feasible; at minimum, dedicate equipment.
  - Avoid cohorting immunocompromised patients with infectious patients.
- **Semi-private rooms:** If unavoidable, place patient with the **lowest transmission risk** with a compatible roommate after IP review; use privacy curtains plus strict PPE/hand hygiene.

### 6.5 Duration and Discontinuation Criteria
**General principle:** Follow **organism-specific** criteria per CDC guidance and IP department protocols. Discontinuation may use **test-based** and/or **symptom-based** strategies depending on pathogen.

- **C. difficile:** Continue Contact precautions for at least **48 hours after diarrhea resolves** (longer per IP if ongoing transmission).
- **Influenza:** Typically until **≥24 hours fever-free without antipyretics** and improving symptoms; longer for severely immunocompromised per IP.
- **COVID-19 and other emerging respiratory pathogens:** Follow current CDC and facility guidance (symptom-based and/or test-based depending on severity and immunocompromise).
- **TB:** Only discontinue Airborne after IP review, considering clinical improvement and microbiologic data (e.g., negative AFB smears/cultures per protocol).
- **MDROs:** Discontinuation (if allowed) per facility policy and risk assessment; may require time-based criteria and/or negative surveillance cultures.

**Documentation:** Isolation initiation and discontinuation must be documented in the EHR and on unit tracking logs (see Section 14).

---

## 7. Environmental Cleaning and Disinfection

**Policy:** Environmental cleaning is performed using **EPA-registered hospital-grade disinfectants** with adherence to **manufacturer wet contact time**. EVS and clinical staff share responsibility: EVS for room cleaning; clinical staff for point-of-care cleaning of shared equipment between patients.

### 7.1 Daily Cleaning (EVS)
- Clean and disinfect patient room daily with emphasis on **high-touch surfaces**:
  - Bed rails, call light, overbed table, bedside table, chair arms
  - IV poles/pumps exterior, monitor surfaces (per manufacturer)
  - Door handles, light switches, sink fixtures, toilet flush handle, bathroom grab bars
- Replace trash and linens per workflow; manage regulated medical waste per policy.

### 7.2 Terminal Cleaning (EVS)
Performed on discharge/transfer, and for isolation rooms per protocol:
- Full clean/disinfect of all surfaces, bathroom, floors, and high-touch items.
- Curtains replaced if soiled and per isolation/outbreak guidance.
- Consider enhanced disinfection (e.g., UV-C) **as adjunct** when indicated by IP/outbreak plan (not a substitute for manual cleaning).

### 7.3 Disinfectants and Contact Times
- Use **EPA-registered hospital disinfectant** for routine daily/terminal cleaning.
- For **C. difficile/spore-formers** or outbreak-directed cleaning, use **EPA List K** sporicidal disinfectant (e.g., bleach-based) per IP guidance.
- **Contact time:** Must meet product label (commonly **1–10 minutes** depending on product). Surfaces must remain visibly wet for required time.

### 7.4 Shared Devices and Patient-Care Equipment
**Clinical staff responsibilities (between patients):**
- Clean/disinfect shared devices after each patient use:
  - Vital signs machines, BP cuffs, stethoscopes (prefer dedicated), thermometers
  - Glucometers (strict adherence to manufacturer + disinfectant compatibility)
  - Bladder scanners, portable pulse oximeters, commodes/wheelchairs
- Use unit-approved disinfectant wipes; ensure full wet contact time; allow to air dry.
- Label equipment as **“Clean”** and store in designated clean area.

**Frequency summary:**
- Patient rooms: **daily** + as needed (spills/soiling) + **terminal** on discharge.
- Shared devices: **after each patient use**.
- Medication room/nourishment areas: **daily** minimum; more frequently during outbreaks.

---

## 8. Device-Associated Infection Prevention

**Policy:** Central lines, urinary catheters, and ventilatory support are managed using standardized **bundles**, daily necessity review, and prompt removal.

### 8.1 CLABSI Prevention Bundle (Central Line)
**Insertion (provider-led, nurse-supported):**
- Hand hygiene prior to procedure
- Maximal sterile barrier (cap, mask, sterile gown, sterile gloves, full-body drape)
- Chlorhexidine skin antisepsis (allow to dry)
- Optimal site selection (avoid femoral when possible in adults)
- Sterile dressing applied; document insertion checklist completion

**Maintenance (nursing-led):**
- Daily review of line necessity (EHR prompt)
- Scrub the hub/port with approved antiseptic for required contact time before access
- Dressing changes per policy and when soiled/loose
- CHG bathing for eligible patients per facility protocol
- Replace administration sets per policy
- Prompt evaluation of fever/sepsis; obtain cultures per protocol (avoid unnecessary draws)

**Removal criteria:** Remove central line when:
- No longer requires IV therapy not suitable via peripheral access
- Hemodynamic monitoring no longer required
- Alternative access established
- Suspected catheter infection per provider/IP direction

### 8.2 CAUTI Prevention Bundle (Urinary Catheter)
**Insertion:**
- Insert only for approved indications (e.g., acute urinary retention/obstruction, accurate I&O in critically ill, perioperative selected surgeries, stage III/IV wounds with incontinence when necessary, end-of-life comfort)
- Aseptic insertion with sterile equipment; trained staff only
- Document indication, date/time, inserter, and catheter size/type

**Maintenance:**
- Maintain closed drainage; secure catheter
- Keep bag below bladder; avoid dependent loops
- Routine perineal hygiene; do not disconnect system unnecessarily
- Obtain urine cultures only when clinically indicated (avoid reflex culturing for asymptomatic bacteriuria)

**Daily necessity and nurse-driven removal:**  
- Daily EHR prompt: “Does patient still meet indication?”  
- If no indication, RN may remove per protocol and notify provider, unless contraindicated.

### 8.3 VAE/VAP Prevention (if applicable on unit)
If ventilated or tracheostomy patients are managed on the unit:
- Head of bed elevation 30–45° (unless contraindicated)
- Daily sedation interruption and readiness-to-extubate assessments (if in scope)
- Oral care (toothbrushing and antiseptic per protocol)
- Subglottic suctioning if available/ordered
- Aspiration precautions and early mobility as appropriate

---

## 9. Surveillance and Monitoring

**Policy:** The unit will use an active surveillance program in partnership with Infection Prevention to track HAIs and process reliability measures.

### 9.1 Active Surveillance Strategy (Med-Surg Focus)
Monitor:
- **CLABSI, CAUTI** (primary device-associated targets)
- **C. difficile infection (CDI)** (hospital-onset)
- **Selected MDRO transmission events** per IP (e.g., MRSA bacteremia, CRE)
- **Respiratory viral clusters** (unit-onset influenza/COVID/RSV) as seasonal/outbreak risk
- **Surgical site infection (SSI)** signals for post-op med-surg patients in collaboration with surgical services (as applicable)

### 9.2 Data Elements and Frequency
- **HAI outcomes (monthly; validated by IP):**
  - Number of events
  - Patient days
  - Device days (central line days, urinary catheter days)
  - Incidence rates per 1,000 device-days (CLABSI, CAUTI)
  - CDI rate per 10,000 patient days (or facility standard)
  - Standardized Infection Ratio (SIR) where applicable

- **Process measures:**
  - Hand hygiene compliance (%), **weekly sampling**, monthly roll-up
  - PPE/isolation signage compliance (%), **weekly**
  - Device bundle adherence (%), **weekly to biweekly**
  - EVS cleaning audit scores (%), **weekly**
  - Supply availability checks (pass/fail), **weekly** or shift-based during surge

### 9.3 Reporting and Data Presentation
- **Monthly unit dashboard** posted and reviewed at staff huddles and quality meetings.
- **Run charts** for key metrics to show trends and impact of interventions.
- Recipients:
  - Unit-based council/quality committee
  - Nurse manager + CNS
  - Infection Prevention Department
  - Hospital Quality/Safety leadership
  - Infection Control Committee (per meeting schedule)

---

## 10. Education and Training

**Policy:** All staff will receive initial and ongoing IPC training with competency validation.

### 10.1 New Hire Orientation (within first 30 days)
Content:
- Standard precautions, WHO 5 Moments
- PPE selection, donning/doffing, isolation signage
- Environmental cleaning responsibilities for clinical staff (shared equipment)
- Device bundle basics (central line, urinary catheter)
- Exposure reporting and Occupational Health process

### 10.2 Annual Competency
- Hand hygiene technique validation
- PPE donning/doffing return demonstration (including N95 knowledge; fit testing per Occ Health schedule)
- Device care competencies (line access, urinary catheter maintenance)
- Cleaning/disinfection of shared equipment

### 10.3 Just-in-Time Training
Triggered by:
- New outbreak/cluster
- New pathogen guidance or policy updates
- Audit findings below target (e.g., <85% compliance)

**Methods:**
- Simulation and return demonstration (PPE, device care)
- Microlearning modules (5–10 minutes)
- Huddle-based coaching with immediate feedback
- Visual cues: posters, badge cards, room signage templates

---

## 11. Outbreak Recognition and Response

### 11.1 Criteria for Declaring a Unit-Level Outbreak (notify IP immediately)
Any of the following:
- **≥2 epidemiologically linked** healthcare-associated cases of the same organism/syndrome within **7–14 days** (time window adjusted by organism incubation and IP guidance)
- Cases above baseline for the unit (e.g., sudden rise in CDI or respiratory viral illness)
- Evidence of transmission via shared staff/equipment or clustering in location/time
- Identification of a high-consequence pathogen or unusual resistance pattern

### 11.2 Immediate Actions (first 0–24 hours)
- **Case finding:** Create line list (patient identifiers per secure process), onset dates, locations, lab results, device status.
- **Isolation/cohorting:** Initiate TBP for suspected cases; review room placement; restrict nonessential movement.
- **Enhanced cleaning:** Increase cleaning frequency of high-touch surfaces; use sporicidal/disinfectant per organism; ensure contact times.
- **Equipment control:** Dedicate equipment; remove nonessential shared items.
- **Staff screening/exposure evaluation:** Coordinate with Occupational Health as directed by IP.
- **Review adherence:** Rapid audits of hand hygiene, PPE, and device practices; immediate coaching.
- **Visitor guidance:** Reinforce limitations, PPE requirements, and hand hygiene.

### 11.3 Communication Plan and Notifications
- Internal:
  - Unit staff huddles each shift with consistent talking points
  - Notify: Unit leadership, IP, EVS leadership, Occupational Health, Quality/Safety, Administrator-on-Call (as needed)
- External:
  - Notify **local/state public health** when required by reportable disease regulations, unusual clusters, or upon IP determination.
  - If media risk/public notification is possible: coordinate through hospital communications and leadership.

---

## 12. Supplies and Logistics

### 12.1 Minimum On-Unit Stock Levels (par levels; adjust to census/acuity)
Maintain at minimum:
- **ABHR:** wall dispensers stocked + 1 back-up cartridge per dispenser zone; pocket bottles available for staff
- **Soap and paper towels:** stocked for all sinks; daily checks
- **Gloves:** multiple sizes; minimum 3-day par
- **Gowns (isolation):** minimum 3-day par based on average isolation census
- **Surgical masks + eye protection:** minimum 3-day par
- **N95s/respirators:** unit cache for immediate use until central distribution; PAPR availability per facility plan
- **Disinfectant wipes:** minimum 3-day par
- **EPA List K sporicidal product access:** available within 2 hours when indicated (or stored on unit if CDI prevalence high)

### 12.2 Emergency Resupply Process
- Charge RN/Unit Manager contacts Supply Chain via established urgent request pathway.
- If after hours: use designated after-hours distribution point; escalate to Administrator-on-Call if delays affect safety.
- EVS escalates disinfectant shortages to EVS leadership + Supply Chain immediately.

### 12.3 Contingency Plan for Shortages (CDC-aligned)
- **PPE optimization:** prioritize respirators for AGPs and airborne pathogens; use extended use per CDC when appropriate and permitted by facility risk assessment.
- **Conservation:** limit room entries via clustering care; use telecommunication when feasible; dedicate staff to isolation cohorts.
- **Substitution:** use equivalent EPA-registered disinfectants compatible with surfaces; follow manufacturer guidance.
- **Reprocessing (only if facility-approved):** follow validated methods and regulatory guidance (e.g., N95 decontamination) if implemented by the hospital.

---

## 13. Auditing and Quality Improvement

### 13.1 Audit Tools (minimum)
- Hand hygiene observation tool (WHO 5 moments-based)
- PPE donning/doffing and isolation signage compliance tool
- Environmental cleaning audit tool (see Appendix B)
- Device bundle audits (CLABSI/CAUTI maintenance checklists)
- Transport precautions audit (as needed)

### 13.2 Audit Frequency and Personnel
- **Hand hygiene:** weekly observations across shifts; performed by trained observers (CNS, charge RN, designated auditors)
- **PPE/signage:** weekly; include weekends at least monthly
- **Environmental cleaning:** weekly EVS + joint IP/Unit validation at least monthly
- **Device bundles:** weekly for patients with devices; daily line necessity prompt review in rounds

### 13.3 Root Cause Analysis and PDSA
- Trigger RCA for:
  - Any CLABSI/CAUTI event
  - Confirmed outbreak
  - Sustained compliance < target for 2 consecutive months
- Use structured tools (e.g., fishbone, 5-Whys).
- Implement PDSA cycles with defined owner, timeline, measure, and sustainment plan.

---

## 14. Documentation and Recordkeeping

**Required EHR Documentation:**
- Isolation initiation (type, indication) and discontinuation (date/time, criteria met)
- Device insertion documentation: indication, date/time, procedural checklist completion where applicable
- Daily device necessity and maintenance elements (bundle fields)
- Patient/visitor education on precautions
- Staff exposure incidents: document per incident reporting; Occupational Health documentation per their system

**Unit Logs (as applicable):**
- Daily environmental cleaning verification (EVS log + unit spot checks)
- Shared equipment cleaning logs (for items like glucometers if required)
- Outbreak line lists and action trackers (secure storage; limited access)
- Fit testing compliance list maintained by Occupational Health (unit may keep read-only roster status)

**Retention:** Per hospital policy and regulatory requirements; outbreak records retained per IP/Quality policy.

