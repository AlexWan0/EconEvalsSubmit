## 4) Signal interfacing and wiring

### 4.1 Temporary harness standard (colors + labeling)
1. **Adopt a consistent color convention (example):**
   - **Red:** +12 V unswitched  
   - **Yellow:** +12 V switched/IGN  
   - **Black:** chassis ground  
   - **Orange:** 5 V sensor supply  
   - **Brown:** sensor ground (low-noise return)  
   - **Green/White (twisted pair):** CAN-H / CAN-L  
   - **Blue/White (twisted pair):** LIN / LIN-GND (or LIN + ref)  
   - **Purple:** analog signal  
   *Rationale:* Enables fast troubleshooting and reduces miswires.

2. **Label both ends of every wire and connector:**
   - Heat-shrink labels or wrap labels with clear heat-shrink overwrap.  
   - Label format: `SYS-SUBSYS-SIGNAL-FROM-TO-PIN` (e.g., `DAQ1-CAN1-H-OBD2-6`).  
   *Rationale:* Temporary installs fail when unlabeled leads get swapped.

3. **Document wire gauge, color, and destination in a running harness log** as you build.  
   *Rationale:* Produces an as-built record even without OEM schematics.

### 4.2 Pinout verification procedure (OBD2, CAN, LIN, sensors)
> Do not assume pinouts beyond standardized connectors (OBD2). Always verify with measurement.

1. **OBD2 identification (standard):**
   - Pin 16: +12 V battery  
   - Pins 4/5: Ground  
   - Pin 6: CAN-H, Pin 14: CAN-L (often one vehicle CAN)  
   *Rationale:* OBD2 is the safest standardized access point.

2. **Verify pins before connection (DMM checks):**
   - Pin 16 to pin 4/5: **~12 V** present (unswitched)  
   - Ground pins to chassis: **<0.2 Ω** preferred  
   *Pass/Fail:* Any unexpected voltage on supposed ground = stop.  
   *Rationale:* Prevents damaging tools and ECUs.

3. **Verify CAN pair (scope or CAN analyzer physical layer):**
   - With network active, observe differential activity; recessive near ~2.5 V each, dominant separation (typical).  
   *Rationale:* Confirms you’re on a CAN pair, not a similar-looking twisted pair.

4. **LIN verification (if used):**
   - LIN is single wire referenced to ground; idle typically near battery voltage; frames pull low.  
   *Rationale:* Prevents mistakenly loading LIN as CAN.

5. **Dedicated sensor connectors (unknown):**
   - Identify supply/ground/signal by measurement:
     - Look for stable **5.0 V** or **12 V** reference.
     - Use continuity to chassis to find ground.
     - Remaining is likely signal.  
   *Pass/Fail:* Do not probe with low impedance loads; use high impedance meter/scope.  
   *Rationale:* Avoids loading sensitive ECU sensor circuits.

### 4.3 Shielding, grounding, and routing rules
1. **Analog signals (mV–V level):**
   - Use shielded cable or twisted pair with sensor ground return.  
   - Ground shield **at one end only** (usually DAQ end).  
   *Rationale:* Prevents ground-loop noise pickup.

2. **High-speed digital (CAN/CAN-FD):**
   - Maintain twisted pair, avoid untwisting more than **10–15 mm** at terminations.  
   - Keep stubs short (see CAN section).  
   *Rationale:* Preserves impedance and reduces reflections.

3. **Separate noisy and sensitive runs:**
   - Route switching power/DC-DC wiring away from analog and antenna leads; cross at 90° if needed.  
   *Rationale:* Reduces conducted and radiated EMI coupling.

### 4.4 Soldered vs crimped joints + QC checks
1. **Preferred: crimp for automotive vibration environments**
   - Use correct terminal + die + wire gauge; verify insulation and conductor crimp.  
   *Rationale:* Proper crimps are more vibration-resistant than solder joints.

2. **If soldering is required (temporary prototypes):**
   - Use strain relief (adhesive-lined heat shrink + stagger splices).  
   - Avoid wicking solder far into the wire (creates a rigid stress riser).  
   *Rationale:* Prevents fatigue breaks.

3. **QC checks (every joint):**
   - **Tug test:** firm pull; no movement.  
   - **Continuity:** expected low resistance (typically **<0.5 Ω** end-to-end for short runs).  
   - **Insulation check:** no shorts to adjacent conductors; visually verify no exposed strands.  
   *Pass/Fail:* Any intermittent continuity when flexing harness = rework.  
   *Rationale:* Most field failures are intermittent opens/shorts.

