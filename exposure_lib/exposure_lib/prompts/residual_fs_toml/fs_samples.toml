Human: I need a detailed, step-by-step, field-ready installation and integration checklist for adding external instrumentation and test gear to a production electric vehicle (BEV/hybrid) for temporary validation testing. The checklist should assume the installer has standard hand and power tools, a DMM, oscilloscope, CAN bus analyzer, wiring harness materials, common automotive connectors, heat shrink, soldering iron, and basic mechanical fasteners.

Cover the following sections with explicit, actionable steps:

1) Pre-installation risk assessment and PPE
- checks to verify vehicle state (isolation, HV system, battery state-of-charge limits, ignition/accessory state)
- required PPE and warnings specific to HV systems and energy storage
- vehicle documentation and approvals to confirm before proceeding

2) Physical mounting and mechanical integration
- recommended mounting locations for data loggers, DAQ boxes, oscilloscopes, and aftermarket sensors in a midsize EV
- mounting hardware types, torque specs for typical sheet-metal fasteners, and anti-vibration mounting methods
- routing best practices to avoid EMI, moving parts, and heat sources
- connector strain relief and sealing for wet environments

3) Power provisioning
- safe methods to power 12V and 5V test equipment from vehicle auxiliary power without affecting vehicle ECUs (fuse sizes, inline fuse recommendations, wiring gauge for runs up to 5 m)
- temporary isolated power solutions if instrumentation must be isolated from vehicle ground; include isolation voltage limits and grounding precautions
- steps to verify no backfeed to vehicle systems and how to monitor for inadvertent current draw

4) Signal interfacing and wiring
- standardized wire color recommendations and labeling method for temporary harnesses
- pinout verification procedure for common connectors (OBD2, CAN twisted pair, LIN, dedicated sensor connectors)
- shielding, grounding, and routing rules to minimize noise on analog and high-speed digital signals
- explicit steps for soldered vs crimped joints and acceptable QC checks (tug test, continuity, insulation)

5) CAN/CAN-FD integration and message handling
- safe method to attach a CAN analyzer or additional CAN nodes without disrupting bus termination (how to measure termination and where to connect)
- steps to passively monitor vs actively inject messages and the approval steps required before active injection
- template for mapping vehicle CAN IDs of interest to signals (what metadata to record: ID, DLC, bit positions, scaling, units)
- conflict avoidance: how to detect and handle message ID collisions

6) Sensor calibration and DAQ settings
- procedures to calibrate typical sensors (temp, pressure, current shunt, voltage dividers) and document calibration coefficients
- recommended sampling rates, anti-aliasing, and filtering for powertrain and HV signals
- recommended channels and reasons to log at high speed vs low speed

7) Functional verification and commissioning checklist
- step-by-step verification after installation (continuity, insulation resistance where applicable, CAN sanity checks, functional low-power tests, staged full-power checks)
- go/no-go criteria and how to isolate a fault found during verification

8) Safety shutdown and emergency procedures
- immediate steps to safely power down and remove instrumentation if a fault or safety event occurs
- how to document and report a safety incident to engineering and safety teams

9) Documentation and handover
- minimum documentation deliverables (as-built harness drawing with pinouts, fuse list, photos of installation, calibration certificates, CAN mapping spreadsheet)
- recommended file formats and naming conventions for integration into vehicle data systems

10) Troubleshooting guide
- prioritized checklist for common issues: high noise on analog channels, missing CAN signals, unexpected ECU faults after connection, unexpected current draw
- diagnostic commands/measurements to perform and expected ranges for a typical midsize BEV (e.g., typical 12V bus voltage range, CAN dominant/recessive voltages, expected idle current draw ranges when ignition off)

Produce the checklist in clear numbered steps, with explicit actions, expected measurement values or pass/fail thresholds where applicable, and a short rationale for each major step (1–2 sentences). Do not assume access to proprietary vehicle schematics; keep procedures generic to midsize EV platforms but practical for immediate field execution by an experienced technician.

LLM: ## 1) Pre‑installation risk assessment and PPE

### 1.1 Verify vehicle state (before touching anything)
1. **Confirm test scope + “temporary install” constraints (what can/can’t be modified).**  
   *Rationale:* Prevents accidental permanent changes or safety-critical interference.

2. **Park/secure vehicle: level ground, Park, parking brake, wheel chocks (if on slope), clear work area.**  
   *Rationale:* Prevents unintended movement during under‑hood/under‑car work.

3. **Verify ignition state and key management:**
   - Ensure **IGN OFF**, **Key/Fob moved ≥5 m away** (or placed in RF shield bag if required).  
   - Confirm **vehicle asleep**: wait **5–15 min** after door close (varies by OEM) and observe reduced activity (no clicking relays, minimal CAN traffic if you can observe).  
   *Rationale:* Many EVs keep ECUs active after shutdown; sleep reduces risk of faults and backfeed.

4. **Check 12 V battery/aux bus state (DMM at 12 V outlet or under‑hood jump posts if accessible):**
   - Typical readings: **12.0–12.8 V** (battery only) or **13.2–14.7 V** (DC/DC active).  
   - Record the value and whether DC/DC appears active.  
   *Rationale:* Power strategy affects instrumentation current draw and backfeed risk.

5. **Check HV system state (generic, no OEM tools assumed):**
   - Confirm **no HV warning** on cluster.  
   - Confirm **charge port unplugged** (unless test requires charging).  
   - If vehicle provides it, record **HV battery SOC**; keep within your program’s limit (typical validation window **20–80% SOC** unless specifically required).  
   *Rationale:* SOC limits reduce thermal risk and ensure repeatable test conditions.

6. **If any work may contact HV components/cables (orange looms, inverter, DC/DC, compressor): stop and follow HV de‑energization procedure** (see 1.2).  
   *Rationale:* Treat any orange-cable zone as potentially energized.

### 1.2 HV safety, isolation, and de‑energization (generic field method)
> If you cannot positively avoid HV zones, do **not** proceed without an HV-qualified person and the correct OEM procedure.

1. **Determine work boundary:** mark the zones you will access (cabin, trunk, under‑hood) and identify any orange HV cables/devices in those zones.  
   *Rationale:* Defines whether HV PPE/LOTO is required.

2. **Apply LOTO / “Do Not Energize” controls (as applicable to your site):**
   - Tag key/fob control, charging connector, and any service disconnect access.  
   *Rationale:* Prevents a second person from re‑energizing.

3. **De‑energize HV only using the OEM service disconnect / maintenance disconnect if available and authorized.**  
   - Wait **minimum 5–10 minutes** after disconnect for capacitors to discharge (follow OEM time if known).  
   *Rationale:* Inverters/DC‑link capacitors can retain dangerous energy.

4. **Verify absence of voltage only with appropriate HV-rated meter and procedures (CAT III/IV as required).**  
   - If you do not have HV-rated test gear and training, **do not test HV directly**.  
   *Rationale:* Incorrect measurement technique can be fatal.

### 1.3 Required PPE and warnings (HV + energy storage)
1. **Minimum for any instrumentation install (low-voltage work):**
   - Safety glasses, cut-resistant gloves for trim/sheet metal, closed-toe shoes.  
   *Rationale:* Prevents common mechanical injuries.

2. **If working near HV components or in compartments with orange cables:**
   - HV insulating gloves rated for your platform (commonly **Class 0, 1000 V**; verify program requirement), leather protectors, arc-rated clothing as required by site policy, insulated tools, remove metal jewelry.  
   *Rationale:* Reduces shock/arc injury risk.

3. **Battery/thermal event readiness:**
   - Know location of **emergency stop**, **fire extinguisher type per site policy**, and evacuation route.  
   *Rationale:* EV battery incidents require immediate controlled response.

### 1.4 Documentation and approvals (must confirm)
1. **Confirm written approval to connect to vehicle networks/power (engineering + fleet/safety).**  
   *Rationale:* CAN injection or power taps can cause safety-critical behavior or warranty issues.

2. **Confirm “allowed connection points” list (generic):**
   - Prefer **OBD2**, existing accessory circuits, or dedicated test connectors if present.  
   *Rationale:* Avoids splicing unknown safety circuits.

3. **Confirm data/security policy:** what CAN data is allowed to capture; encryption/PII rules; storage location.  
   *Rationale:* Compliance and traceability.

