## 2) Physical mounting and mechanical integration

### 2.1 Recommended mounting locations (midsize EV)
1. **Cabin (preferred for electronics):**
   - Under passenger seat (if no seat harness interference), rear footwell, trunk side cubby, cargo floor (with ventilation).  
   *Rationale:* Dry, temperature-moderate, and reduced exposure to splash/stone impact.

2. **Trunk/cargo area (preferred for DAQ/data loggers):**
   - Against rear seatback or trunk side panel using a mounting plate.  
   *Rationale:* Stable volume, easy cable management, low driver interference.

3. **Under‑hood (only if necessary):**
   - Use for rugged sensors only; avoid placing DAQ/loggers near inverter/DC‑DC/charge modules.  
   *Rationale:* Under-hood is hot and EMI-heavy.

4. **Do not mount:**
   - In airbag deployment zones (dash, A‑pillar trims, steering column area), near pedal travel, seat track travel, or within driver knee/head strike zones.  
   *Rationale:* Safety and legal compliance.

### 2.2 Mounting hardware + torque guidance (generic sheet-metal practice)
1. **Choose mounting method (in order of preference):**
   1) Existing threaded bosses/rail holes + bracket  
   2) Rivnuts/nutserts (if approved)  
   3) Plusnuts (for thin sheet)  
   4) Temporary: industrial hook-and-loop + secondary strap (only for light devices)  
   *Rationale:* Minimizes vehicle modification and improves survivability.

2. **Use vibration isolation:**
   - Rubber isolators (M4/M5), foam pad under device, and strain-relieved harness.  
   *Rationale:* Prevents connector fretting and logger resets.

3. **Typical torque ranges (use fastener manufacturer spec if known):**
   - **M4:** 1.5–2.5 N·m  
   - **M5:** 3–5 N·m  
   - **M6:** 7–10 N·m  
   - Self-tapping sheet-metal screws (≈#8/#10): **2–4 N·m** (stop at snug; avoid strip)  
   *Pass/Fail:* No sheet-metal “spin,” no cracked plastics, device cannot move by hand.  
   *Rationale:* Under-torque loosens; over-torque strips thin sheet.

4. **Use thread locker only if allowed and temperature-appropriate (medium strength).**  
   *Rationale:* Vibration resistance without permanent bonding.

### 2.3 Routing best practices (EMI, moving parts, heat)
1. **Plan harness route on paper first (start/end points, grommets, service loops).**  
   *Rationale:* Prevents rework and accidental HV proximity.

2. **Maintain separation distances (rule of thumb):**
   - Keep instrumentation harnesses **≥100 mm** from high-current cables (DC/DC output, motor phase cables, HV lines).  
   - Cross unavoidable power cables at **90°**.  
   *Rationale:* Reduces inductive/capacitive coupling.

3. **Avoid moving parts and pinch points:**
   - Steering shaft, pedals, seat rails, door hinges, hood hinges, suspension/axles, cooling fans.  
   *Pass/Fail:* Full travel check shows **no contact** and **no tension**.  
   *Rationale:* Prevents chafing and sudden disconnection.

4. **Avoid heat sources:**
   - Radiator hoses, exhaust (hybrid), inverter, e-motor, heater/PTC, compressor.  
   *Pass/Fail:* Harness surface temp target **<70°C** (or cable rating minus margin).  
   *Rationale:* Heat accelerates insulation failure.

### 2.4 Connector strain relief + wet-environment sealing
1. **Provide strain relief within 50–100 mm of every connector:**
   - P‑clip, zip tie to fixed structure, or adhesive mount + tie.  
   *Rationale:* Prevents connector fatigue and intermittent signals.

2. **Use drip loops for any under-hood or floor-routed cables.**  
   *Rationale:* Prevents water migration into connectors.

3. **Seal penetrations:**
   - Use existing grommets when possible; otherwise use a proper bulkhead grommet and sealant compatible with automotive use.  
   *Pass/Fail:* No exposed sharp edges; no water path into cabin.  
   *Rationale:* Prevents leaks and harness damage.

4. **Connector selection:**
   - For wet areas use sealed connectors (IP67/69K-rated families) and adhesive-lined heat shrink on splices.  
   *Rationale:* Field installs fail most often at moisture ingress points.

