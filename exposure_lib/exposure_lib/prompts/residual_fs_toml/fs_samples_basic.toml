## 7) Functional verification and commissioning checklist

### 7.1 Electrical verification (before powering instruments)
1. **Visual inspection:** no chafe points, no harness tension, grommets seated, connectors fully latched.  
   *Pass/Fail:* Any exposed conductor or unlatched connector = fix.  
   *Rationale:* Prevents immediate shorts/intermittents.

2. **Continuity checks (DMM):**
   - Each power lead to its intended endpoint continuity OK.  
   - No continuity between +12 V and GND (expect open / high resistance).  
   *Rationale:* Catches miswires before fusing.

3. **Polarity check at instrument connector:** verify + and – with DMM before plugging device.  
   *Rationale:* Prevents instant device damage.

4. **(If applicable) Insulation resistance:** only if you have proper megohmmeter and procedure and you are **not** connected to ECUs/sensitive electronics.  
   *Rationale:* Megger can damage electronics if misapplied.

### 7.2 CAN sanity checks (passive first)
1. **Connect CAN analyzer in listen-only mode.**  
2. **Confirm bus activity:** frames present, error frames near zero.  
   *Pass/Fail:* Bus errors increasing after connection = disconnect and re-check termination/stub.  
   *Rationale:* Ensures your tap is non-invasive.

3. **Check physical layer with scope (if needed):**
   - Recessive ~2.5 V both lines; dominant produces separation (typical).  
   *Rationale:* Confirms correct wiring and polarity (H/L).

### 7.3 Low-power functional test (staged)
1. **Power instrumentation with vehicle IGN OFF** (only if allowed and parasitic draw acceptable).  
   - Verify current draw matches expectation (within **±20%**).  
   *Rationale:* Validates wiring and fuse sizing.

2. **IGN ON (not READY) stage:**
   - Verify no new warnings, no unexpected ECU wake storms, no CAN errors.  
   *Go/No-Go:* Any safety-related warning or repeated relays clicking = stop and isolate.  
   *Rationale:* Detects backfeed/ground issues early.

3. **READY stage (drivetrain enabled) with wheels chocked or on dyno/controlled area:**
   - Monitor 12 V voltage stability, logger resets, CAN error counters.  
   *Rationale:* Confirms survivability during highest electrical noise.

### 7.4 Fault isolation method (if a problem appears)
1. **Immediate action:** return to safest state (IGN OFF), keep vehicle stationary.  
2. **Divide and conquer:**
   - Remove CAN connection first (most likely to cause ECU/network faults).  
   - Then remove power tap.  
   - Then remove individual sensor inputs.  
   *Rationale:* Quickly identifies the offending interface.

3. **Record before/after:** DTCs, warning lights, time, what changed.  
   *Rationale:* Enables engineering to reproduce and fix.

---

## 8) Safety shutdown and emergency procedures

### 8.1 Immediate actions for fault/safety event
1. **If any smoke, arcing, unusual heat, burning smell, or HV warning escalation:**
   - Stop test, **IGN OFF**, maintain distance, do not touch suspected hot components.  
   - If safe, disconnect instrumentation power via your inline fuse or kill switch.  
   *Rationale:* Removes energy source and reduces escalation.

2. **If vehicle is in READY and behavior is abnormal (creep/torque request anomalies):**
   - Apply brake, shift to Park if possible, IGN OFF, secure vehicle.  
   *Rationale:* Prevents unintended motion.

3. **If thermal runaway suspected (battery venting, loud hissing, rapid heat):**
   - Evacuate per site plan and notify emergency response. Do not attempt to remove equipment near the battery pack.  
   *Rationale:* Battery events are hazardous and time-critical.

### 8.2 Incident documentation/reporting
1. **Document within minutes:**
   - Time, location, vehicle ID/VIN (if permitted), SOC, operating mode, what was connected, photos (if safe), and any logs captured.  
   *Rationale:* Preserves evidence.

2. **Notify engineering + safety using your organization’s escalation path** and quarantine the vehicle if required.  
   *Rationale:* Prevents repeat incidents and supports root cause analysis.

---

## 9) Documentation and handover

### 9.1 Minimum deliverables (field-ready)
1. **As-built harness drawing** (even hand-drawn scanned) with:
   - Wire colors, gauges, lengths, splice points, connector types, pinouts.  
2. **Fuse list**:
   - Source point, fuse rating/type, wire gauge, expected load.  
3. **Installation photos**:
   - Mounting, routing, grounding points, grommets, labels, overall placement.  
4. **Calibration records/certificates**:
   - Sensor serials + coefficients + date.  
5. **CAN mapping spreadsheet** (IDs/signals metadata as in Section 5.3).  
6. **Commissioning checklist results** (pass/fail + measurements).  
*Rationale:* Enables repeatability and safe maintenance by someone else.

### 9.2 Recommended file formats + naming conventions
1. **Formats:**
   - Drawings: PDF (+ source: DXF/Visio if used)  
   - Tables: CSV + XLSX  
   - Photos: JPG/PNG (high resolution)  
   - Logs: MF4/BLF/ASC (depending on tools) + a README.txt  
2. **Naming convention (example):**  
   `Program_VehicleID_Date_System_Rev.ext`  
   Example: `BEVVal_V1234_2026-02-23_DAQInstall_R03.pdf`  
*Rationale:* Prevents mix-ups across vehicles and revisions.

---

## 10) Troubleshooting guide (prioritized)

### 10.1 High noise on analog channels
1. **Check grounding topology:**
   - Ensure sensor ground returns to DAQ (not chassis) for low-level signals.  
   - Verify shield grounded at one end only.  
   *Expected:* Noise reduces immediately when proper return/shielding is applied.

2. **Check routing:**
   - Separate from DC/DC and HV harnesses; minimize loop area (twist signal+return).  
   *Expected:* Reduced periodic ripple (often DC/DC switching-related).

3. **Check DAQ input configuration:**
   - Differential vs single-ended, input range, anti-alias filter enabled.  
   *Expected:* Correct range avoids quantization and clipping.

4. **Scope the signal at the DAQ input** to distinguish sensor noise vs acquisition noise.  
   *Pass/Fail:* If noise exists only after DAQ, fix DAQ settings/cabling; if at sensor, fix shielding/sensor power.

### 10.2 Missing CAN signals / no traffic
1. **Confirm correct pins/pair (OBD2 6/14 for CAN):** continuity and polarity.  
2. **Check bitrate / CAN-FD settings:** auto-detect then lock configuration.  
3. **Check termination resistance:** expect ~60 Ω (vehicle asleep/off).  
4. **Check for bus-off/errors on analyzer:** if errors spike after connection, your stub/termination is wrong.  
5. **If using OBD2 and still no traffic:** vehicle may be asleep; wake by IGN ON (without READY) and re-check.  
*Expected physical layer (typical):*
- Recessive: CAN-H ≈ 2.5 V, CAN-L ≈ 2.5 V  
- Dominant: CAN-H ≈ 3.0–3.5 V, CAN-L ≈ 1.5–2.0 V (approximate; varies)  

### 10.3 Unexpected ECU faults after connection
1. **Immediately revert to passive monitoring** (no transmit).  
2. **Disconnect in this order:** CAN connection → sensor taps → power tap.  
3. **Check for ground offsets:**
   - Measure voltage between your instrument ground and chassis ground under load (should be near **0 V**, typically **<100 mV**).  
4. **Check for backfeed:**
   - With IGN OFF, verify no voltage is being fed into vehicle circuits through your equipment (see 3.3).  
5. **Review what you touched:** any sensor line loading can trigger plausibility faults.  
*Expected:* Faults often disappear when the offending interface is removed; if not, document DTCs and do not continue.

### 10.4 Unexpected current draw / vehicle won’t sleep
1. **Measure added parasitic draw with IGN OFF** on your instrumentation branch.  
   - Target additional draw typically **<50–100 mA** unless explicitly allowed.  
2. **Check if you tapped an always-on circuit that keeps ECUs awake** (OBD2 pin 16 power can contribute if your device chatters on CAN).  
3. **Disable transmit/polling features on logger**; ensure listen-only and low-power mode.  
4. **Add a switched relay or ignition-controlled supply** for the instrumentation power.  
*Typical 12 V bus expectations (generic midsize BEV):*
- Vehicle asleep: **~12.0–12.8 V** at battery  
- DC/DC active (IGN ON/READY): **~13.2–14.7 V**  
- If voltage drops < **11.5 V** under your added load: wiring too thin, poor ground, or excessive load.

---

