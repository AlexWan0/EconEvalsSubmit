## 5) CAN / CAN‑FD integration and message handling

### 5.1 Attach without disrupting termination
1. **Determine bus speed and type (CAN vs CAN‑FD) using analyzer auto-detect** (or observe bit timing).  
   *Rationale:* Wrong bit rate can look like “no traffic.”

2. **Measure termination (vehicle OFF/sleep if possible):**
   - DMM resistance between CAN-H and CAN-L at your access point.  
   - Expected:
     - **~60 Ω** = two 120 Ω terminators present (normal)  
     - **~120 Ω** = one terminator present (bus not fully terminated or measuring at a segment)  
     - **<50 Ω or >70 Ω** = possible extra terminator, wiring issue, or different topology  
   *Pass/Fail:* If resistance shifts significantly after connecting your device, you likely added termination—fix before proceeding.  
   *Rationale:* Extra termination can kill bus communication.

3. **Connect using a high-impedance tap (preferred):**
   - Use a proper CAN breakout, or splice a short stub to CAN-H/CAN-L.  
   - Keep stub length **≤0.3 m** (prefer **≤0.1 m**) for CAN-FD.  
   *Rationale:* Long stubs cause reflections, worse with CAN‑FD.

4. **Do not add termination on your analyzer/node** unless you are explicitly at an end of the bus and authorized.  
   *Rationale:* Vehicle is already terminated.

### 5.2 Passive monitoring vs active injection (and approvals)
1. **Default to passive (listen-only) mode on CAN tools** for initial hookup.  
   *Rationale:* Eliminates risk of unintended control messages.

2. **Approval steps before active injection:**
   - Written engineering approval with: target bus, IDs, rates, start/stop conditions, fail-safe behavior.  
   - On-road injection requires safety sign-off and controlled environment first (dyno/closed track).  
   *Rationale:* Injection can cause propulsion/braking/charging faults.

3. **If injecting:**
   - Start with **lowest rate** and **limited duration**, verify no DTCs, then scale.  
   - Implement a hard “kill switch” for the injector power.  
   *Rationale:* Limits exposure if behavior is unexpected.

### 5.3 CAN signal mapping template (record metadata)
Create a spreadsheet/table with at least:

- Vehicle / build / date / tester
- Bus name (e.g., OBD2-CAN, PT-CAN, CH-CAN), nominal bitrate, CAN-FD data bitrate (if applicable)
- **Message ID** (hex), **IDE** (11/29-bit), **DLC**
- **Cycle time** observed (ms)
- **Byte order** (Intel/Motorola) and **bit positions** (start bit, length)
- **Scaling** (factor, offset), **units**, **min/max**, **signed/unsigned**
- **Source ECU** (if inferred), **notes** (conditions when active)
*Rationale:* Enables repeatable decoding without proprietary DBC files.

### 5.4 Conflict avoidance (ID collisions)
1. **Before connecting any new active node:**
   - Passively log traffic and list all IDs currently present + their periods.  
   *Rationale:* Establishes a baseline.

2. **Detect collisions:**
   - If you transmit an ID already present, arbitration may “work” but data becomes ambiguous; some ECUs may fault.  
   *Pass/Fail:* Any increase in bus errors, missing frames, or new DTCs after connection = stop injection.  
   *Rationale:* Collisions can silently corrupt control signals.

3. **Mitigation:**
   - Use a gateway device that can remap IDs, or choose unused IDs on a dedicated test bus only.  
   *Rationale:* Keeps production bus behavior intact.

