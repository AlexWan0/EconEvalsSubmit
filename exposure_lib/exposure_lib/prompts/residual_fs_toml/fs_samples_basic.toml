## 6) Sensor calibration and DAQ settings

### 6.1 Calibration procedures (field-practical)
1. **Temperature sensors (thermocouple/RTD/NTC):**
   - Verify type in DAQ settings (K-type, PT100, etc.).  
   - Two-point check (field): ambient (~20–30°C) and a known reference (ice bath ~0°C if feasible, or calibrated handheld thermometer).  
   - Record offset/slope or DAQ channel correction.  
   *Pass/Fail:* Error within test requirement (common field goal **±1–2°C**).  
   *Rationale:* Temperature channels drift and are wiring-sensitive.

2. **Pressure sensors (0.5–4.5 V typical):**
   - Confirm supply voltage (5.0 V) and sensor datasheet transfer if known; otherwise do a zero check (vent to atmosphere).  
   - Apply known pressure (hand pump + reference gauge if available).  
   - Record slope/offset.  
   *Pass/Fail:* Zero within acceptable tolerance (e.g., **±1% FS** field goal).  
   *Rationale:* Small offsets ruin derived calculations.

3. **Current shunt (mV output):**
   - Measure shunt resistance (4-wire if possible) or use marked value.  
   - With known load current (bench load or vehicle steady state), validate reading.  
   - Ensure DAQ differential input and proper range.  
   *Pass/Fail:* Error typically **<2%** for validation use (or per test).  
   *Rationale:* Shunt wiring/grounding errors are common.

4. **Voltage divider (HV or intermediate voltages):**
   - Verify resistor values with meter before install.  
   - Calculate expected scaling; apply known low voltage first (e.g., 12 V) before connecting to higher voltage nodes.  
   - Use high-value resistors to limit fault current; confirm DAQ input impedance compatibility.  
   *Pass/Fail:* Scaled voltage within **±1%** at verification point.  
   *Rationale:* Prevents DAQ overvoltage and improves accuracy.

5. **Document calibration:**
   - Channel ID, sensor serial, date, method, coefficients, and person.  
   *Rationale:* Traceability for test reports.

### 6.2 Sampling rates, anti-aliasing, filtering (powertrain/HV-oriented)
1. **Set sampling based on signal bandwidth:**
   - Slow thermal (coolant, battery temps): **1–10 Hz**
   - Pressures (coolant/refrigerant): **10–100 Hz**
   - Pedal/torque requests (if analog): **100–500 Hz**
   - 12 V bus voltage/current: **100–1,000 Hz**
   - HV voltage/current (if measuring fast transients): **1–10 kHz** (with proper sensors)  
   *Rationale:* Avoids huge files while capturing needed dynamics.

2. **Anti-aliasing/filtering:**
   - If sampling at Fs, set low-pass cutoff roughly **≤ Fs/5** (or enable DAQ anti-alias filter if available).  
   *Rationale:* Prevents aliasing from inverter switching and DC/DC ripple.

3. **CAN logging rates:**
   - Log **all frames** (timestamped) rather than downsampled signals when possible; decode offline.  
   *Rationale:* Preserves causality and timing for validation.

### 6.3 Channels to log high-speed vs low-speed (typical)
- **High-speed (priority):** HV current/voltage (if safe), inverter/MCU-related analogs, wheel speed (if available), 12 V bus, DC/DC output current, fast pressure pulses, vibration/accelerometers.  
  *Rationale:* Needed for transient analysis and fault correlation.

- **Low-speed:** temperatures, SOC, slow pressures, ambient, GPS position (1–10 Hz), operator markers.  
  *Rationale:* Slow dynamics don’t benefit from high sampling.

